name: Python Quality

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with Ruff
        run: ruff check .
      - name: Check formatting (Black)
        run: |
          black --check src tests airflow
      - name: Type check (Granular Mypy)
        run: |
          mypy src/settings.py src/specs src/transforms src/observability src/validation src/runners --no-incremental
      - name: Unit tests with coverage
        run: |
          pytest tests/unit/ --cov=src --cov-report=term --cov-report=xml -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
