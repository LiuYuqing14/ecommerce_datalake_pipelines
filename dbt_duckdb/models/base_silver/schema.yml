              config:
                tags: ["relationships"]
                severity: warn
      - name: product_id
        description: "Product identifier (FK to product_catalog)."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_ecommerce__product_catalog')
