              config:
                tags: ["relationships"]
                severity: warn
      - name: quantity
        description: "Quantity of the product on the order line."
        tests:
          - not_null:
              config:
                severity: warn
      - name: unit_price
        description: "Unit price charged for the order line."
        tests:
          - not_null:
              config:
                severity: warn
      - name: order_dt
        description: "Partition date for order items."
        tests:
          - not_null:
              config:
                severity: warn
      - name: batch_id
        description: "Lineage batch identifier."
        tests:
          - not_null:
              config:
                severity: warn
      - name: ingestion_ts
        description: "Ingestion timestamp for lineage."
        tests:
          - not_null:
              config:
                severity: warn
      - name: event_id
        description: "Lineage event identifier."
        tests:
