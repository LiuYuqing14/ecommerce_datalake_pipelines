version: 2

models:
  - name: stg_ecommerce__orders
    description: "Base Silver cleaned orders"
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "gross_total >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "net_total >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_discount_amount is null or total_discount_amount >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "shipping_cost is null or shipping_cost >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "actual_shipping_cost is null or actual_shipping_cost >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "payment_processing_fee is null or payment_processing_fee >= 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_items is null or total_items >= 0"
          config:
            severity: warn
    columns:
      - name: order_id
        description: "Unique order identifier."
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn
          - dbt_utils.expression_is_true:
              arguments:
                expression: "like 'ORD-%'"
              config:
                severity: warn
      - name: customer_id
        description: "Customer identifier associated with the order."
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.expression_is_true:
              arguments:
                expression: "like 'CUST-%' or customer_id like 'GUEST-%'"
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_ecommerce__customers')
                field: customer_id
              config:
                tags: ["relationships"]
                severity: warn
      - name: order_date
        description: "Timestamp when the order was placed."
        tests:
          - not_null:
              config:
                severity: warn
      - name: gross_total
        description: "Gross order total before discounts."
        tests:
          - not_null:
              config:
                severity: warn
      - name: net_total
        description: "Net order total after discounts."
        tests:
          - not_null:
              config:
                severity: warn
      - name: order_channel
        description: "Channel where the order was placed."
        tests:
          - accepted_values:
              arguments:
                values: ["web", "phone", "social media", "ebay", "newegg"]
              config:
                severity: warn
      - name: payment_method
        description: "Payment method used for the order."
        tests:
          - accepted_values:
              arguments:
                values: ["credit card", "paypal", "apple pay", "google pay", "ach"]
              config:
                severity: warn
      - name: shipping_speed
        description: "Shipping speed selected for the order."
        tests:
          - accepted_values:
              arguments:
                values: ["standard", "two-day", "overnight"]
              config:
                severity: warn
      - name: customer_tier
        description: "Customer tier at time of order."
        tests:
          - accepted_values:
              arguments:
                values: ["bronze", "silver", "gold", "platinum"]
              config:
                severity: warn
      - name: order_dt
        description: "Partition date for orders."
        tests:
          - not_null:
              config:
                severity: warn
      - name: batch_id
        description: "Lineage batch identifier."
        tests:
          - not_null:
              config:
                severity: warn
      - name: ingestion_ts
        description: "Ingestion timestamp for lineage."
        tests:
          - not_null:
              config:
                severity: warn
      - name: event_id
        description: "Lineage event identifier."
        tests:
          - not_null:
              config:
                severity: warn
      - name: source_file
        description: "Lineage source file."
        tests:
          - not_null:
              config:
                severity: warn
  - name: stg_ecommerce__order_items
    description: "Base Silver cleaned order items"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id, product_id]
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "quantity > 0"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "unit_price >= 0"
          config:
